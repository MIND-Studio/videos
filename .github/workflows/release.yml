# Build the videos images on every `v*` tag (or manual run) and push to GHCR:
#   mind-video-web    — the Next.js studio (:3170). Plans reels, previews them
#                       in-browser, proxies render to the worker. No pod creds.
#   mind-video-worker — the stateless MP4 render service (:3172). Runs
#                       `npx hyperframes render` (headless Chromium + ffmpeg) per
#                       request; internal-only behind the /api/render proxy.
# The infra repo pins each @sha256 digest in
# k8s/argocd/children/app-videos.yaml.
#
#   git tag v0.1.0 && git push --tags    (or: gh workflow run release.yml)

name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "git ref to build (tag or branch)"
        required: true
        default: "main"

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: web
            image: mind-video-web
          - target: worker
            image: mind-video-worker
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=ref,event=tag
            type=sha,format=long
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}

      - name: Build & push (${{ matrix.target }})
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}
          build-args: |
            NODE_AUTH_TOKEN=${{ secrets.GITHUB_TOKEN }}
            NEXT_PUBLIC_SOLID_ISSUER=https://pods.mindpods.org/
            NEXT_PUBLIC_POD_BASE_URL=https://pods.mindpods.org/

      - name: Emit digest-pinned image ref
        run: |
          IMAGE_LC="$(echo "${REGISTRY}/${{ github.repository_owner }}/${{ matrix.image }}" | tr '[:upper:]' '[:lower:]')"
          echo "Pinned image: ${IMAGE_LC}@${{ steps.push.outputs.digest }}"
          {
            echo "### ${{ matrix.image }}"
            echo '```'
            echo "${IMAGE_LC}@${{ steps.push.outputs.digest }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
